name: Feature request
description: Propose an enhancement for the Autonomous SRE Agent.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal.
        Please describe the operator impact, safety implications, and expected value.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: A clear statement of the gap or limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List alternative approaches you evaluated.

  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Detection
        - Diagnostics
        - Remediation
        - Multi-agent coordination
        - API or CLI
        - Documentation
        - Developer experience
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety and guardrail considerations
      description: Describe blast-radius, approval, and rollback concerns.
      placeholder: Explain how this change preserves safety-first operation.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and roadmap docs.
          required: true
        - label: I reviewed CONTRIBUTING.md and architecture constraints.
          required: true