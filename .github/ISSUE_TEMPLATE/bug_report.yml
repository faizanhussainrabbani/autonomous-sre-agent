name: Bug report
description: Report a reproducible defect in the Autonomous SRE Agent.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.
        Please provide enough detail to reproduce and diagnose safely.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Affected component
      description: Which service, module, or adapter is affected?
      placeholder: Example: diagnostics pipeline, kubernetes operator adapter
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and commands.
      placeholder: |
        1. Run ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide runtime context.
      placeholder: |
        - OS:
        - Python version:
        - Deployment target: Kubernetes / AWS / Azure / local
        - Commit SHA or branch:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Paste relevant logs, stack traces, or screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I included steps to reproduce.
          required: true
        - label: I understand sensitive security findings must follow SECURITY.md.
          required: true